name: fuel-loyalty-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: fuel-loyalty-prod
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_production
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      RACK_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
      APP_URL: ${APP_URL:-http://localhost:8080}
      MAILER_FROM: ${MAILER_FROM:-no-reply@fuel-loyalty.local}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
      FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-}
      FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID:-}
      FIREBASE_APP_ID: ${FIREBASE_APP_ID:-}
      FIREBASE_MEASUREMENT_ID: ${FIREBASE_MEASUREMENT_ID:-}
      FIREBASE_WEB_VAPID_KEY: ${FIREBASE_WEB_VAPID_KEY:-}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-local-production-secret-key}
      PORT: "8080"
    command: ["/bin/sh", "-lc", "bundle exec rails db:prepare && bundle exec puma -C config/puma.rb"]
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/up || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_production
    ports:
      - "5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_production"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_prod_data:
  redis_prod_data:
