steps:
  # -----------------------------
  # Pull previous image (for cache)
  # -----------------------------
  - name: gcr.io/cloud-builders/docker
    id: Pull
    entrypoint: /bin/bash
    args:
      - -c
      - |
        docker pull $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:latest || exit 0

  # -----------------------------
  # Build image (BuildKit enabled)
  # -----------------------------
  - name: gcr.io/cloud-builders/docker
    id: Build
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --cache-from=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:latest
      - -t
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - -t
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:latest
      - -f
      - Dockerfile
      - .

  # -----------------------------
  # Push image
  # -----------------------------
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - --all-tags
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME

  # -----------------------------
  # Run database migrations
  # -----------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Migrate
    entrypoint: /bin/bash
    args:
      - -c
      - |
        gcloud run jobs deploy ${_SERVICE_NAME}-migrate \
          --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA \
          --region=$_DEPLOY_REGION \
          --service-account=${_RUNTIME_SERVICE_ACCOUNT} \
          --command=bundle \
          --args=exec,rails,db:migrate \
          --max-retries=0 \
          --parallelism=1 \
          --tasks=1 \
          --task-timeout=900s \
          --set-env-vars=RAILS_ENV=production,DATABASE_URL=${_DATABASE_URL},SECRET_KEY_BASE=${_SECRET_KEY_BASE},RAILS_SERVE_STATIC_FILES=true,APP_URL=${_APP_URL},MAILER_FROM=${_MAILER_FROM},ADMIN_NOTIFICATION_API_TOKEN=${_ADMIN_NOTIFICATION_API_TOKEN},FIREBASE_API_KEY=${_FIREBASE_API_KEY},FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN},FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET},FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID},FIREBASE_APP_ID=${_FIREBASE_APP_ID},FIREBASE_MEASUREMENT_ID=${_FIREBASE_MEASUREMENT_ID},FIREBASE_WEB_VAPID_KEY=${_FIREBASE_WEB_VAPID_KEY},RELEASE_SHA=$COMMIT_SHA \
          --quiet

        gcloud run jobs execute ${_SERVICE_NAME}-migrate \
          --region=$_DEPLOY_REGION \
          --wait \
          --quiet

  # -----------------------------
  # Deploy to Cloud Run
  # -----------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --service-account=$_RUNTIME_SERVICE_ACCOUNT
      - --quiet

      # Runtime configuration
      - --set-env-vars=RAILS_ENV=production,DATABASE_URL=${_DATABASE_URL},SECRET_KEY_BASE=${_SECRET_KEY_BASE},RAILS_SERVE_STATIC_FILES=true,APP_URL=${_APP_URL},MAILER_FROM=${_MAILER_FROM},ADMIN_NOTIFICATION_API_TOKEN=${_ADMIN_NOTIFICATION_API_TOKEN},FIREBASE_API_KEY=${_FIREBASE_API_KEY},FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN},FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET},FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID},FIREBASE_APP_ID=${_FIREBASE_APP_ID},FIREBASE_MEASUREMENT_ID=${_FIREBASE_MEASUREMENT_ID},FIREBASE_WEB_VAPID_KEY=${_FIREBASE_WEB_VAPID_KEY},RELEASE_SHA=$COMMIT_SHA


      # Labels (traceability)
      - --update-labels=managed-by=gcp-cloud-build-deploy-cloud-run,gcb-trigger-id=$_TRIGGER_ID,gcb-trigger-region=$LOCATION,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID

images:
  - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:latest

