steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fuel-loyalty:latest'
      - '.'

  # Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/fuel-loyalty:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fuel-loyalty'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--set-env-vars'
      - 'RAILS_ENV=production,SECRET_KEY_BASE=${_SECRET_KEY_BASE}'
      - '--set-cloudsql-instances'
      - '${_CLOUD_SQL_CONNECTION_NAME}'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_CONNECTION_NAME}'

# Store images in Google Container Registry
images:
  - 'gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/fuel-loyalty:latest'

# Set timeout
timeout: '1200s'

# Substitution variables (set these in Cloud Build trigger)
substitutions:
  _SECRET_KEY_BASE: ''
  _CLOUD_SQL_CONNECTION_NAME: ''