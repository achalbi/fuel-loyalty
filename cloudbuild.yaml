steps:
  # -----------------------------
  # Build Docker image (BuildKit enabled)
  # -----------------------------
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fuel-loyalty:latest'
      - '.'

  # -----------------------------
  # Push images
  # -----------------------------
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fuel-loyalty:latest']

  # -----------------------------
  # Deploy to Cloud Run
  # -----------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fuel-loyalty'
      - '--image=gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--set-env-vars=RAILS_ENV=production'
      - '--set-secrets=SECRET_KEY_BASE=${_SECRET_KEY_BASE}:latest'
      - '--set-secrets=DATABASE_URL=${_DATABASE_URL}:latest'

images:
  - 'gcr.io/$PROJECT_ID/fuel-loyalty:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/fuel-loyalty:latest'

timeout: '1200s'

# Substitution variables (set these in Cloud Build trigger)
substitutions:
